name: Monitor Amministrazione Trasparente Borghi

on:
  schedule:
    # Ogni giorno alle 7:00 UTC (9:00 ora italiana in estate, 8:00 in inverno)
    - cron: "0 7 * * *"
  workflow_dispatch: {} # permette anche l'avvio manuale da GitHub

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit nuovi PDF e stato
        run: |
          git config user.name "borghi-monitor-bot"
          git config user.email "actions@github.com"
          git add archivio/ state.json
          git diff --staged --quiet || git commit -m "Nuovi atti pubblicati $(date +%Y-%m-%d)"
          git push
